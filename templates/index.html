<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07060b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>YUUKI CORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4de8ff"/>
      <stop offset="100%" stop-color="#ff8fc0"/>
    </linearGradient>
  </defs>
</svg>

<div class="aurora" aria-hidden="true"></div>

<div class="shell">

  <div class="drawer-overlay" id="drawerOverlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark" id="brandCore">
        <svg viewBox="0 0 40 40" class="core-svg">
          <circle class="ring ring-outer" cx="20" cy="20" r="17"/>
          <circle class="ring ring-mid" cx="20" cy="20" r="12"/>
          <circle class="ring ring-inner" cx="20" cy="20" r="6"/>
        </svg>
      </div>
      <span class="brand-name">YUUKI</span>
      <button class="drawer-close" id="drawerClose" aria-label="Fechar menu">✕</button>
    </div>

    <nav class="nav-list">
      <button class="nav-item" id="newChatBtn">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        <span>Nova conversa</span>
      </button>

      <div class="nav-search">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
        <input type="text" id="searchInput" placeholder="Pesquisar conversas">
      </div>
    </nav>

    <div class="sidebar-section recent-section">
      <span class="sidebar-label">Recentes</span>
      <div class="conversation-list" id="conversationList">
        <div class="conversation-empty" id="conversationEmpty">Nenhuma conversa ainda</div>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="status-row">
        <span class="status-dot" id="engineDot"></span>
        <span id="engineLabel">aguardando</span>
      </div>
      <div class="token-readout">
        <div class="token-bar-track">
          <div class="token-bar-fill" id="tokenBarFill"></div>
        </div>
        <span id="tokenText" class="mono-small">0 / 100000 tokens</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Abrir menu">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
      </button>
      <span class="topbar-title">YUUKI</span>
      <span class="topbar-spacer"></span>
    </div>

    <div class="scanline"></div>

    <div class="chat-scroll" id="chatScroll">
      <div class="empty-state" id="emptyState">
        <div class="core-large">
          <svg viewBox="0 0 200 200" class="core-svg-large">
            <circle class="ring ring-outer" cx="100" cy="100" r="86"/>
            <circle class="ring ring-mid" cx="100" cy="100" r="60"/>
            <circle class="ring ring-inner" cx="100" cy="100" r="30"/>
            <circle class="ring ring-core" cx="100" cy="100" r="8"/>
          </svg>
        </div>
        <h1>Como posso ajudar, senhor?</h1>
        <p>Pergunte algo, peça para abrir um site ou anexe um arquivo para eu analisar.</p>
      </div>

      <div class="messages" id="messages"></div>
    </div>

    <div class="composer">
      <div class="composer-pill">
        <label class="attach-btn" for="fileInput" title="Anexar arquivo (.pdf .docx .txt)">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </label>
        <input type="file" id="fileInput" accept=".pdf,.docx,.txt" hidden>

        <input type="text" id="messageInput" placeholder="Aguardando ordens, senhor..." autocomplete="off">

        <button class="mic-btn" id="micBtn" type="button" title="Reconhecimento de voz — em breve" disabled>
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
        </button>

        <button id="sendBtn" aria-label="Enviar">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 11l18-8-8 18-2-8-8-2z"/></svg>
        </button>
      </div>
      <div class="composer-footnote">
        <span class="status-dot" id="engineDotComposer"></span>
        <span id="engineLabelComposer" class="mono-small">aguardando</span>
      </div>
    </div>

  </main>
</div>

<script src="/static/js/script.js"></script>
</body>
</html>
